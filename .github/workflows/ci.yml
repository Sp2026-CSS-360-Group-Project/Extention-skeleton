name: CI

on:
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run formatter check (Prettier)
        run: npm run format:check

      - name: Run linter (ESLint)
        run: npm run lint

      - name: Run security audit (npm audit)
        run: npm run security

      - name: Run tests
        run: npm test

      - name: Run smoke tests
        run: npm run smoke
