name: CI

on:
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run formatter check (Prettier)
        run: npx prettier --check "**/*.js" "**/*.json" "**/*.css" "**/*.html"

      - name: Run linter (ESLint)
        run: npx eslint "**/*.js" --ignore-pattern "node_modules/"

      - name: Run security audit (npm audit)
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test